description: >
  rhino-gh-mcp Grasshopper bridge (.gha). Drop the "rhino-gh-mcp Server (v1)"
  component on a canvas, set Run=True, and the rhino-gh-mcp Python MCP server
  can read your canvas, add and wire components, drive sliders, capture the
  viewport, and inject script components — all gated by visible AllowParameters
  / AllowComponents / AllowScripting toggles on the component. Companion to
  the rhinogh-mcp-rhino Rhino plugin and the Python MCP server (Claude Desktop
  extension at github.com/xunliuDesign/rhino-gh-mcp).
